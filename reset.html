<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сброс пароля | QADAM.AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-white transition-colors duration-300 min-h-screen flex flex-col overflow-hidden">

    <div class="blob -top-20 -left-20 animate-pulse"></div>
    <div class="blob bottom-0 -right-20 opacity-50"></div>

    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto w-full z-10">
        <a href="index.html" class="text-xl font-extrabold tracking-tighter flex items-center gap-2">
            <span class="dark:text-white">QADAM.</span><span class="text-indigo-600 dark:text-indigo-400">AI</span>
        </a>
        <button onclick="toggleTheme()" class="w-10 h-10 flex items-center justify-center glass rounded-xl bg-white/20 dark:bg-white/5 border border-gray-200 dark:border-white/10 relative overflow-hidden">
            <i id="theme-icon" class="fas fa-sun text-orange-500 dark:text-yellow-400 relative z-10"></i>
        </button>
    </nav>

    <main class="flex-1 flex items-center justify-center p-6 z-10 animate-fade-in">
        <div class="glass p-8 md:p-12 rounded-[2.5rem] w-full max-w-md bg-white/60 dark:bg-white/5 border border-gray-200 dark:border-white/10 shadow-2xl backdrop-blur-xl relative overflow-hidden">
            
            <a href="login.html" class="absolute top-8 left-8 text-slate-400 hover:text-indigo-500 transition">
                <i class="fas fa-arrow-left"></i> Назад
            </a>

            <div id="step-1" class="transition-all duration-500">
                <div class="text-center mb-8 mt-6">
                    <div class="w-16 h-16 bg-indigo-100 dark:bg-indigo-500/20 rounded-full flex items-center justify-center mx-auto mb-4 text-indigo-600 dark:text-indigo-400 text-2xl">
                        <i class="fas fa-key"></i>
                    </div>
                    <h2 class="text-2xl font-black mb-2">Забыли пароль?</h2>
                    <p class="text-slate-500 dark:text-gray-400 text-sm font-medium">Введите почту, чтобы сбросить его</p>
                </div>

                <form onsubmit="handleResetCheck(event)" class="space-y-6">
                    <div class="group">
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Email</label>
                        <div class="relative">
                            <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="email" required placeholder="name@example.com" class="w-full pl-12 pr-5 py-4 rounded-2xl bg-white dark:bg-white/5 border border-gray-200 dark:border-white/10 focus:border-indigo-500 outline-none transition font-medium dark:text-white">
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-indigo-500 transition shadow-lg shadow-indigo-500/30">
                        Найти аккаунт
                    </button>
                </form>
            </div>

            <div id="step-2" class="hidden opacity-0 translate-x-20 transition-all duration-500">
                <div class="text-center mb-8 mt-6">
                    <div class="w-16 h-16 bg-emerald-100 dark:bg-emerald-500/20 rounded-full flex items-center justify-center mx-auto mb-4 text-emerald-600 dark:text-emerald-400 text-2xl">
                        <i class="fas fa-check"></i>
                    </div>
                    <h2 class="text-2xl font-black mb-2">Аккаунт найден!</h2>
                    <p class="text-slate-500 dark:text-gray-400 text-sm font-medium">Придумайте новый пароль</p>
                </div>

                <form onsubmit="handleNewPassword(event)" class="space-y-6">
                    <div class="group">
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Новый пароль</label>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="password" required placeholder="••••••••" minlength="6" class="w-full pl-12 pr-5 py-4 rounded-2xl bg-white dark:bg-white/5 border border-gray-200 dark:border-white/10 focus:border-indigo-500 outline-none transition font-medium dark:text-white">
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-emerald-500 transition shadow-lg shadow-emerald-500/30">
                        Сохранить пароль
                    </button>
                </form>
            </div>

        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
